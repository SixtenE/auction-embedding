openapi: 3.0.3
info:
  title: auction-embedding API
  description: |
    Upload images to S3-compatible storage, embed with Gemini, store metadata in PostgreSQL and vectors in Qdrant, and search by image similarity.

    **Multipart:** `POST /images` uses form field `image` (required file) and optional `metadata` (JSON object as a string). `POST /search/image` uses `image` and optional `topK` (decimal digits, 1–100).

    **Errors:** Validation failures (e.g. invalid UUID in path) return `400` with `{ "error": "Validation error", "details": … }`. Application errors return `{ "error": string, "code"?: string }` with an appropriate status. Unhandled errors return `500` with `{ "error": "Internal Server Error" }`.

    **Limits:** Max body size is `MAX_UPLOAD_BYTES` (default 10 MB). Search `topK` is 1–100; if omitted, the server uses `DEFAULT_TOP_K` from the environment (often 10).

    **Similarity:** Match `score` is approximately cosine similarity (1 − cosine distance) for indexed vectors.

    This spec assumes the default dev server base URL; set `PORT` in the environment if different.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local default (see `PORT` in `.env`)

tags:
  - name: Health
  - name: Images
  - name: Search

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness / readiness probe
      operationId: getHealth
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /images:
    post:
      tags: [Images]
      summary: Upload and index an image
      description: |
        Stores the file, optionally merges JSON `metadata` into `tags`, computes embedding when processing completes.

        Allowed image types (declared MIME must match magic bytes when not HEIC rules): JPEG, PNG, WebP, HEIC/HEIF. HEIC is decoded and stored as PNG.
      operationId: createImage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                  description: Image file (JPEG, PNG, WebP, HEIC/HEIF)
                metadata:
                  type: string
                  description: Optional JSON object serialized as a string (stored as tags)
            encoding:
              image:
                contentType: application/octet-stream, image/jpeg, image/png, image/webp, image/heic, image/heif
      responses:
        "200":
          description: Image stored, embedded, and indexed in one request; `status` is `indexed` on success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageUploadResponse"
        "400":
          description: Missing file, metadata not a JSON object, invalid JSON, unsupported type, MIME mismatch, corrupt image, or bad dimensions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
              examples:
                missingFile:
                  value: { error: Image is required, code: MISSING_FILE }
                badMetadata:
                  value: { error: Invalid metadata JSON, code: BAD_METADATA }
                metadataNotObject:
                  value: { error: metadata must be a JSON object, code: BAD_METADATA }
                invalidImage:
                  value: { error: Unsupported or invalid image, code: INVALID_IMAGE }
                unsupportedType:
                  value: { error: Unsupported image type, code: UNSUPPORTED_TYPE }
                mimeMismatch:
                  value: { error: MIME type does not match file contents, code: MIME_MISMATCH }
                badImage:
                  value: { error: Invalid or corrupt image, code: BAD_IMAGE }
        "413":
          description: Raw or processed image exceeds `MAX_UPLOAD_BYTES`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
              examples:
                rawTooLarge:
                  value:
                    error: File too large
                    code: FILE_TOO_LARGE
                processedTooLarge:
                  value:
                    error: Processed image still too large
                    code: FILE_TOO_LARGE
        "502":
          $ref: "#/components/responses/BadGatewayError"
        "500":
          $ref: "#/components/responses/InternalError"

  /images/{id}:
    get:
      tags: [Images]
      summary: Get image metadata and presigned URL
      operationId: getImageById
      parameters:
        - $ref: "#/components/parameters/ImageId"
      responses:
        "200":
          description: Full record with short-lived presigned GET URL for the object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImagePublic"
        "400":
          $ref: "#/components/responses/ZodValidationError"
        "404":
          description: No image with this id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
              example:
                error: Image not found
                code: NOT_FOUND
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Images]
      summary: Delete an image
      description: Deletes the Postgres row, removes the vector from Qdrant, and deletes the object from storage (failures on vector or storage cleanup are logged but still return 204 if the row was removed).
      operationId: deleteImage
      parameters:
        - $ref: "#/components/parameters/ImageId"
      responses:
        "204":
          description: Deleted successfully (no body)
        "400":
          $ref: "#/components/responses/ZodValidationError"
        "404":
          description: No image with this id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
              example:
                error: Image not found
                code: NOT_FOUND
        "500":
          $ref: "#/components/responses/InternalError"

  /images/{id}/reindex:
    post:
      tags: [Images]
      summary: Re-embed from stored object
      description: Re-runs embedding/indexing for an existing row using the configured model and dimensions.
      operationId: reindexImage
      parameters:
        - $ref: "#/components/parameters/ImageId"
      responses:
        "200":
          description: Same shape as upload response after reindex
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageUploadResponse"
        "400":
          $ref: "#/components/responses/ZodValidationError"
        "404":
          description: No image with this id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
              example:
                error: Image not found
                code: NOT_FOUND
        "502":
          $ref: "#/components/responses/BadGatewayError"
        "500":
          $ref: "#/components/responses/InternalError"

  /search/image:
    post:
      tags: [Search]
      summary: Similarity search by query image
      description: |
        Embeds the uploaded query image and returns the nearest indexed neighbors using Qdrant cosine similarity.
      operationId: searchByImage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                topK:
                  type: string
                  description: Number of results (integer as string, 1–100). Omit for server default.
                  example: "10"
            encoding:
              image:
                contentType: application/octet-stream, image/jpeg, image/png, image/webp, image/heic, image/heif
      responses:
        "200":
          description: Ranked matches with presigned URLs and light metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageSearchResponse"
        "400":
          description: Missing file, bad topK, or image validation error (`AppError` with `code`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
              examples:
                badTopK:
                  value: { error: topK must be between 1 and 100, code: BAD_TOPK }
                missingFile:
                  value: { error: Image is required, code: MISSING_FILE }
                invalidImage:
                  value: { error: Unsupported or invalid image, code: INVALID_IMAGE }
                badImage:
                  value: { error: Invalid or corrupt image, code: BAD_IMAGE }
        "413":
          description: Query file too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "502":
          $ref: "#/components/responses/BadGatewayError"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  parameters:
    ImageId:
      name: id
      in: path
      required: true
      description: Image UUID
      schema:
        type: string
        format: uuid

  responses:
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error:
                type: string
                example: Internal Server Error

    ZodValidationError:
      description: Request failed schema validation (e.g. path `id` is not a UUID)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ZodErrorBody"

    BadGatewayError:
      description: Upstream failure (e.g. embedding API or Qdrant)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppError"
          examples:
            embedding:
              value:
                error: Embedding API failed
                code: EMBEDDING_FAILED
            vectorDb:
              value:
                error: Qdrant search failed
                code: VECTOR_DB_ERROR

  schemas:
    HealthResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          example: true

    AppError:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
          description: Machine-readable code when present (e.g. `MISSING_FILE`, `NOT_FOUND`, `BAD_TOPK`, `EMBEDDING_FAILED`, `VECTOR_DB_ERROR`)

    ZodErrorBody:
      type: object
      required: [error, details]
      properties:
        error:
          type: string
          example: Validation error
        details:
          description: Zod flattened field errors and form errors
          type: object
          additionalProperties: true

    ImageStatus:
      type: string
      enum:
        - uploaded
        - embedding
        - indexed
        - failed

    ImageUploadResponse:
      type: object
      description: |
        Upload and reindex handlers always serialize `width` and `height` when present in the model; values may be JSON `null` when dimensions are unknown.
      required:
        - id
        - status
        - url
        - embeddingModel
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/ImageStatus"
        url:
          type: string
          format: uri
          description: Presigned GET URL for the stored object
        width:
          type: integer
          nullable: true
          description: Pixel width when known
        height:
          type: integer
          nullable: true
          description: Pixel height when known
        embeddingModel:
          type: string

    ImagePublic:
      type: object
      required:
        - id
        - originalFilename
        - mimeType
        - fileSize
        - url
        - embeddingModel
        - embeddingDim
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
          nullable: true
        originalFilename:
          type: string
        mimeType:
          type: string
        fileSize:
          type: integer
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        url:
          type: string
          format: uri
        embeddingModel:
          type: string
        embeddingDim:
          type: integer
        status:
          $ref: "#/components/schemas/ImageStatus"
        tags:
          type: object
          nullable: true
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SearchMatch:
      type: object
      required: [id, url, score, metadata]
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        score:
          type: number
          description: Similarity score from Qdrant cosine search
        metadata:
          type: object
          description: |
            Response objects include `width` and `height` keys with numbers or JSON `null` when unknown.
          required: [filename, mimeType]
          properties:
            filename:
              type: string
            width:
              type: integer
              nullable: true
              description: Pixel width when known
            height:
              type: integer
              nullable: true
              description: Pixel height when known
            mimeType:
              type: string

    ImageSearchResponse:
      type: object
      required: [query, matches]
      properties:
        query:
          type: object
          required: [topK]
          properties:
            topK:
              type: integer
              minimum: 1
              maximum: 100
        matches:
          type: array
          items:
            $ref: "#/components/schemas/SearchMatch"
